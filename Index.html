<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Store Index Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --bg:#f4f6f9;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --border:#e2e8f0;
}

*{box-sizing:border-box}

body{
  margin:0;min-height:100vh;
  display:flex;justify-content:center;align-items:center;
  background:var(--bg);font-family:Inter,sans-serif;
}

.login-card{
  width:390px;background:var(--card);
  border:1px solid var(--border);border-radius:16px;
  padding:32px 28px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  animation:fade .4s ease;
}

@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.logo{text-align:center;font-size:22px;font-weight:800;color:var(--primary);margin-bottom:4px;letter-spacing:.5px}
.subtitle{text-align:center;font-size:13px;color:var(--muted);margin-bottom:26px}

.field-group{
  display:flex;margin-bottom:14px;
  border-radius:10px;overflow:hidden;
  border:1.5px solid var(--border);
  transition:border-color .2s,box-shadow .2s;
}
.field-group:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.field-group .icon{
  background:var(--primary);color:#fff;
  width:44px;display:flex;align-items:center;justify-content:center;
  font-size:15px;flex-shrink:0;
}
.field-group input{
  flex:1;padding:11px 12px;border:none;outline:none;
  font-size:14px;color:var(--text);background:#fff;
}

.pw-wrap{position:relative;flex:1;display:flex}
.pw-wrap input{flex:1;padding:11px 36px 11px 12px;border:none;outline:none;font-size:14px;color:var(--text);background:#fff}
.eye-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:#94a3b8;cursor:pointer;font-size:15px;padding:0;
}
.eye-btn:hover{color:var(--primary)}

.opts-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;font-size:13px}
.opts-row label{display:flex;align-items:center;gap:7px;color:var(--muted);cursor:pointer;user-select:none}
.opts-row input[type=checkbox]{accent-color:var(--primary);width:15px;height:15px}
.forgot-lnk{color:var(--primary);cursor:pointer}
.forgot-lnk:hover{text-decoration:underline}

/* ===== BUTTON ===== */
.login-btn{
  width:100%;padding:13px;
  background:var(--primary);color:#fff;
  border:none;border-radius:10px;
  font-size:15px;font-weight:700;letter-spacing:.3px;
  cursor:pointer;position:relative;overflow:hidden;
  transition:background .2s,box-shadow .2s,transform .1s;
}
.login-btn:hover:not(:disabled){background:var(--primary-dark);box-shadow:0 6px 20px rgba(37,99,235,.38)}
.login-btn:active:not(:disabled){transform:scale(.97)}
.login-btn:disabled{cursor:not-allowed}

.btn-inner{display:flex;align-items:center;justify-content:center;gap:9px}

/* Ripple */
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.35);
  transform:scale(0);
  animation:rpl .55s linear;
  pointer-events:none;
}
@keyframes rpl{to{transform:scale(4);opacity:0}}

/* Spinner */
.btn-spinner{
  width:18px;height:18px;
  border:2.5px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;flex-shrink:0;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Success */
.login-btn.success{background:#16a34a;box-shadow:0 6px 20px rgba(22,163,74,.35)}
.login-btn.success .btn-inner{animation:popIn .3s ease}
@keyframes popIn{0%{transform:scale(.8)}60%{transform:scale(1.1)}100%{transform:scale(1)}}

/* Error */
.login-btn.error{background:#dc2626;box-shadow:0 6px 20px rgba(220,38,38,.3)}
.login-btn.shake{animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* Toast */
#toastBox{position:fixed;top:15px;right:15px;z-index:9999}
.toast-msg{
  background:#1e293b;color:#fff;
  padding:10px 16px;border-radius:10px;
  margin-top:8px;font-size:13px;min-width:190px;
  animation:tsl .3s ease;
}
@keyframes tsl{from{transform:translateX(80px);opacity:0}to{transform:translateX(0);opacity:1}}

/* Forgot Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);justify-content:center;align-items:center;z-index:999}
.overlay.open{display:flex}
.modal-card{
  width:310px;background:#fff;border-radius:14px;padding:24px;
  box-shadow:0 20px 50px rgba(0,0,0,.2);animation:fade .3s ease;
}
.modal-card h5{font-weight:700;text-align:center;margin-bottom:16px;color:var(--text)}
.modal-card .field-group{margin-bottom:12px}
.modal-card .field-group input{padding:9px 12px}
.modal-card .field-group .icon{width:38px;font-size:13px}
.mbtns{display:flex;gap:8px;margin-top:4px}
.mbtns button{flex:1;padding:9px;font-size:13px;border-radius:9px;font-weight:600;cursor:pointer}
.mbtn-cancel{background:#fff;border:1.5px solid var(--border);color:var(--text)}
.mbtn-cancel:hover{background:#f8fafc}
.mbtn-submit{background:var(--primary);border:none;color:#fff}
.mbtn-submit:hover{background:var(--primary-dark)}
</style>
</head>
<body>

<div id="toastBox"></div>

<div class="login-card">
  <div class="logo">LOGIN</div>

  <div class="field-group">
    <span class="icon"><i class="fa fa-id-badge"></i></span>
    <input id="loginUsername" placeholder="User ID" maxlength="6">
  </div>

  <div class="field-group">
    <span class="icon"><i class="fa fa-lock"></i></span>
    <div class="pw-wrap">
      <input type="password" id="loginPassword" placeholder="Password">
      <button class="eye-btn" onclick="togglePassword()" title="Show/hide">
        <i class="fa fa-eye" id="eyeIcon"></i>
      </button>
    </div>
  </div>

  <div class="opts-row">
    <label><input type="checkbox" id="rememberMe"> Remember me</label>
    <span class="forgot-lnk" onclick="openForgot()">Forgot Password?</span>
  </div>

  <button class="login-btn" id="loginBtn" onclick="login(event)">
    <div class="btn-inner" id="btnInner">
      <div class="btn-spinner" id="btnSpinner"></div>
      <span id="btnText"><i class="fa fa-sign-in-alt" style="margin-right:7px"></i>Login</span>
    </div>
  </button>
</div>

<!-- Forgot Password Modal -->
<div class="overlay" id="forgotOverlay">
  <div class="modal-card">
    <h5><i class="fa fa-key me-2" style="color:var(--primary)"></i>Reset Password</h5>

    <div class="field-group">
      <span class="icon"><i class="fa fa-id-badge"></i></span>
      <input id="fpUser" placeholder="6 Digit Employee ID">
    </div>
    <div class="field-group">
      <span class="icon"><i class="fa fa-lock"></i></span>
      <input type="password" id="fpNew" placeholder="New Password">
    </div>
    <div class="field-group">
      <span class="icon"><i class="fa fa-check"></i></span>
      <input type="password" id="fpConfirm" placeholder="Confirm Password">
    </div>

    <div class="mbtns">
      <button class="mbtn-cancel" onclick="closeForgot()">Cancel</button>
      <button class="mbtn-submit" onclick="resetPassword()">Submit</button>
    </div>
  </div>
</div>

<script>
const WEB_APP_URL="https://script.google.com/macros/s/AKfycbz8A7xKZp4xXXooDJxPjNKqrnjmFcfjXaIlLBE9WmrTHwV_r04GTW2j0lU9b3ueKWjcdQ/exec";

window.addEventListener('DOMContentLoaded',()=>{
  const su=localStorage.getItem('si_savedUser');
  const sp=localStorage.getItem('si_savedPass');
  if(su){document.getElementById('loginUsername').value=su;document.getElementById('rememberMe').checked=true;}
  if(sp) document.getElementById('loginPassword').value=sp;
});

function toast(msg){
  const box=document.getElementById('toastBox');
  const d=document.createElement('div');
  d.className='toast-msg';d.innerText=msg;
  box.appendChild(d);setTimeout(()=>d.remove(),3000);
}

function togglePassword(){
  const inp=document.getElementById('loginPassword');
  const ic=document.getElementById('eyeIcon');
  inp.type=inp.type==='password'?'text':'password';
  ic.className=inp.type==='text'?'fa fa-eye-slash':'fa fa-eye';
}

// Ripple effect
function addRipple(btn,e){
  const r=document.createElement('span');
  r.className='ripple';
  const rect=btn.getBoundingClientRect();
  const sz=Math.max(rect.width,rect.height)*2;
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  btn.appendChild(r);
  setTimeout(()=>r.remove(),600);
}

function setLoading(on){
  document.getElementById('btnSpinner').style.display=on?'block':'none';
  document.getElementById('btnText').style.display=on?'none':'block';
  document.getElementById('loginBtn').disabled=on;
}

function setSuccess(){
  const btn=document.getElementById('loginBtn');
  document.getElementById('btnSpinner').style.display='none';
  document.getElementById('btnText').innerHTML='<i class="fa fa-check-circle" style="margin-right:7px"></i>Successfull!';
  document.getElementById('btnText').style.display='block';
  btn.classList.add('success');
}

function setError(){
  const btn=document.getElementById('loginBtn');
  document.getElementById('btnSpinner').style.display='none';
  document.getElementById('btnText').innerHTML='<i class="fa fa-times-circle" style="margin-right:7px"></i>Wrong id or password';
  document.getElementById('btnText').style.display='block';
  btn.classList.add('error','shake');
  btn.disabled=false;
  setTimeout(()=>{
    btn.classList.remove('error','shake');
    document.getElementById('btnText').innerHTML='<i class="fa fa-sign-in-alt" style="margin-right:7px"></i>Login';
  },2200);
}

async function login(e){
  const btn=document.getElementById('loginBtn');
  addRipple(btn,e);

  const u=document.getElementById('loginUsername').value.trim();
  const p=document.getElementById('loginPassword').value;
  const rem=document.getElementById('rememberMe').checked;

  if(!u||!p){
    btn.classList.add('shake');
    setTimeout(()=>btn.classList.remove('shake'),500);
    toast('Fill id and password');
    return;
  }

  setLoading(true);

  try{
    const res=await fetch(`${WEB_APP_URL}?action=login&Username=${u}&Password=${p}`);
    const data=await res.json();
    if(data.status==='success'){
      if(rem){localStorage.setItem('si_savedUser',u);localStorage.setItem('si_savedPass',p);}
      else{localStorage.removeItem('si_savedUser');localStorage.removeItem('si_savedPass');}
      sessionStorage.setItem('loggedIn','true');
      sessionStorage.setItem('userName',data.name);
      setSuccess();
      setTimeout(()=>location.href='Indexing.html',1200);
    } else {
      setError();
    }
  } catch(err){
    setError();
    toast('Network error — Try again later');
  }
}

function openForgot(){document.getElementById('forgotOverlay').classList.add('open')}
function closeForgot(){
  document.getElementById('forgotOverlay').classList.remove('open');
  ['fpUser','fpNew','fpConfirm'].forEach(id=>document.getElementById(id).value='');
}

async function resetPassword(){
  const u=document.getElementById('fpUser').value.trim();
  const n=document.getElementById('fpNew').value;
  const c=document.getElementById('fpConfirm').value;
  if(!u){toast('Fill empoloyee id');return;}
  if(n.length<4){toast('Password should be 4 digit');return;}
  if(n!==c){toast('Passwords not match');return;}
  try{
    const res=await fetch(`${WEB_APP_URL}?action=resetPassword&Username=${u}&NewPassword=${n}`);
    const data=await res.json();
    if(data.status==='success'){
      toast('Password update successfully!');
      if(localStorage.getItem('si_savedUser')===u) localStorage.setItem('si_savedPass',n);
      closeForgot();
    } else { toast('Failed — Check Employee ID'); }
  } catch(e){ toast('Network error'); }
}
</script>
</body>
</html>
